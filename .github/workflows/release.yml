name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build executables
      run: |
        python build.py
        
    - name: Create Release Archive
      run: |
        cd dist/release
        7z a -tzip ../../ArchiveShell.zip .
        
    - name: Get version from tag
      id: get_version
      run: |
        $version = "${{ github.ref_name }}"
        if ($version -match '^v.*') {
          echo "version=$version" >> $env:GITHUB_OUTPUT
        } else {
          echo "version=v1.0.0" >> $env:GITHUB_OUTPUT
        }
      shell: pwsh
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: ArchiveShell ${{ steps.get_version.outputs.version }}
        body: |
          ## 更新内容
          
          ### 功能特性
          - ✅ 双击 7z/RAR 文件直接在资源管理器中浏览
          - ✅ 支持复制/粘贴压缩包内文件
          - ✅ 支持拖拽操作
          - ✅ 显示压缩包内文件详细信息
          - ✅ 支持子文件夹浏览
          
          ### 安装说明
          1. 下载 `ArchiveShell.zip`
          2. 解压到任意目录
          3. 以管理员身份运行 `ArchiveShell_GUI.exe` 或 `ArchiveShell_Installer.exe install`
          
          ### 系统要求
          - Windows 10/11 (64 位)
          - 管理员权限
          
          ### 文件说明
          - `ArchiveShell.exe` - 压缩文件浏览器主程序
          - `ArchiveShell_Installer.exe` - 命令行安装/卸载程序
          - `ArchiveShell_GUI.exe` - 图形化安装程序
          
          ### 卸载
          运行 `ArchiveShell_Installer.exe uninstall`
        files: |
          ArchiveShell.zip
          dist/release/ArchiveShell.exe
          dist/release/ArchiveShell_Installer.exe
          dist/release/ArchiveShell_GUI.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
